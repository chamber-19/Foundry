name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - Foundry.sln
      - "src/**"
      - "tests/**"
      - "bot/requirements.txt"
      - "bot/foundry_bot.py"
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - Foundry.sln
      - "src/**"
      - "tests/**"
      - "bot/requirements.txt"
      - "bot/foundry_bot.py"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET dependencies
        run: dotnet restore Foundry.sln

      - name: Build broker and core
        run: dotnet build Foundry.sln --no-restore

      - name: Run .NET tests
        run: dotnet test Foundry.sln --no-build --verbosity normal

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Verify Discord bot dependencies
        working-directory: bot
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m py_compile foundry_bot.py
