# Dependabot configuration for Foundry.
#
# Ecosystems:
#   - nuget        — .NET 10 broker + core library
#   - pip          — Discord bot only (Python is not used for ML anymore;
#                    the old scripts/ml + scripts/scoring trees are
#                    scheduled for removal)
#   - github-actions — workflow pins
#
# Foundry does NOT ship a Tauri / NSIS / Windows installer, so the
# Linux-only RUSTSEC ignores carried by the consumer apps
# (transmittal-builder, launcher, Drawing-List-Manager) do NOT apply
# here. Foundry is a server.
version: 2
updates:
  # .NET (broker + core library)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dotnet"

  # Python (Discord bot)
  - package-ecosystem: "pip"
    directory: "/bot"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
