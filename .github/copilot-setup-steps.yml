name: "Copilot Setup Steps"
on: workflow_dispatch

jobs:
  copilot-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Restore .NET dependencies
        run: dotnet restore Foundry.sln

      - name: Build
        run: dotnet build Foundry.sln --no-restore

      - name: Install Python test dependencies
        run: pip install scikit-learn numpy

      - name: Verify
        run: |
          dotnet test Foundry.sln --no-build --verbosity normal
          python -m pytest scripts/ml/test_ml_suite_artifacts.py -v